<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Calculator</title>
</head>
<body>
    <div class="container">
        <h1 class="title">Calculator</h1>
        <div class="mes">You can use a numbers[0-9] and these[- + * /] - operators, also negative and decimal figures. Spaces are allowed(one and more). <br>  <pre>Example: <b>1000/100* 5  -2.2*5 + 100 / -10 - -7-14.02</b></pre></div>
        <form class="form">
            <input class="input" type="text" name="field">
            <div style="text-align: center; margin-bottom: 20px;"><button><b>Solve</b></button></div>
        </form>
        <div class="wrap__outer">
            <div class="outer">0</div>
        </div>
        <div class="wrap__outer">
            <div class="time">?</div>
        </div>

        
    </div>

    
    <script src="main.js"></script>
</body>
</html>
